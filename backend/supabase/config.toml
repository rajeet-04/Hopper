# Supabase local development config
# For production, configure via Supabase Dashboard

[api]
enabled = true
port = 54321
schemas = ["public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
major_version = 15

[studio]
enabled = true
port = 54323

[auth]
enabled = false  # We use device-hash based anonymous auth

[storage]
enabled = false  # No file storage needed for MVP
